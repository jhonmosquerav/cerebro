# =====================================================================
# onboard/company.yaml — MANIFIESTO DE ONBOARD (fuente de verdad)
# Copia este archivo a onboard/company.yaml, complétalo y aplica ONBOARD.
# Mismo manifiesto -> mismo genoma. Es lo que hace REPRODUCIBLE la adaptación.
# =====================================================================

company:
  name: "Acme Bots"                 # nombre de la empresa
  sector: "agencia de automatización"
  language: es                       # idioma principal del cerebro
  domains: ["acmebots.com"]

# Tipos de documento que maneja el negocio (guían la clasificación de INGEST)
document_types: [propuesta, contrato, transcripcion-call, ticket]

# Entidades clave: cada clave es una categoría -> carpeta en wiki/semantic/
entities:
  clientes: []
  productos: ["bot-whatsapp"]
  herramientas: ["n8n", "twilio"]

# Identificador natural por categoría (gen-identidad-de-pagina): campo cuyo valor nombra la
# página única de cada entidad (id_pagina = slug determinista de ese valor). Opcional: sin
# declararlo aplica el fallback del gen (título normalizado; los eventos usan su id o fecha).
identity:
  productos: nombre

# Glosario / siglas internas (el agente las respeta al ingerir y consultar)
glossary:
  MRR: "ingreso recurrente mensual"
  lead: "prospecto que pidió información"

roles:
  contributors: ["ventas", "ops"]
  mutation_approver: "fundador"      # quién aprueba mutaciones del genoma

# Verbos de relación propios del dominio (amplían el núcleo {usa,depende_de,contradice,reemplaza})
# LINT valida toda relación contra la unión núcleo + estos tipos declarados.
relation_types: [recibio_propuesta, proviene_de, define_precio]

# Confianza inicial por tipo de fuente (gen-confianza-por-fuente)
source_trust:
  oficial: 0.9     # contratos, fichas técnicas, datos de sistema
  interna: 0.7     # notas internas, transcripciones
  blanda: 0.4      # reseñas, redes, rumores (solo corroboran)

# Umbral de eventos con clave común para crear una síntesis (gen-sintesis-de-volumen)
sintesis_umbral: 3

# Umbral de anclas por sección de index.md: al superarlo, CONSOLIDATE parte la sección
# en una página-hub wiki/<tier>/hub-<área>.md (gen-jerarquizacion-indice)
hub_umbral: 7

# Umbrales del ciclo de vida de la memoria (gen-ciclo-de-vida). OPCIONAL: si se omite el
# bloque (o cualquier clave), aplican estos mismos defaults del genoma base.
# Defaults v1 razonados pero NO calibrados: se revisan con las métricas del piloto Fase 0.
ciclo_de_vida:
  decay_ventana_dias: { high: 14, medium: 60, low: 180 }   # días sin refuerzo = 1 ventana
  decaimiento_delta: 0.05     # confidence que se resta por ventana vencida
  refuerzo_delta: { oficial: 0.10, interna: 0.05, blanda: 0.03 }  # subida por confirmación
  confidence_techo: 0.95      # techo absoluto del refuerzo automático
  piso_archivo: 0.30          # confidence <= piso => CONSOLIDATE propone archivar
  archivo_eventos_dias: 180   # eventos más viejos => candidatos a archivo
  promocion:                  # working -> semantic (todas las condiciones a la vez)
    confidence_min: 0.70
    fuentes_min: 2            # fuentes distintas en `sources`...
    refs_min: 2               # ...o páginas distintas que la referencien
    edad_min_dias: 7          # y >= 1 refuerzo posterior a `created`

# Sensibilidad por defecto de las páginas nuevas (gen-confidencialidad). Dominios sensibles
# (legal, salud) lo ponen en 'confidencial'; el resto suele dejar 'interno'.
default_sensibilidad: interno

# Genes específicos del sector que ONBOARD siembra (pasan por la compuerta)
seed_genes:
  - id: gen-propuestas
    trigger: "la fuente es una propuesta comercial"
    rule: "Toda propuesta va a wiki/semantic/propuestas/ con precio, alcance y objeciones; enlázala al cliente."
    target_tier: semantic

# Taxonomía inicial de carpetas a crear por tier
taxonomy:
  semantic: [clientes, productos, herramientas, propuestas, casos-exito]
  procedural: [sops-ventas]

# Lente de grafo interactiva (gen-graph-lens, OPCIONAL). CEREBRO funciona sin esto.
# Guardrail FIJO: las páginas 'confidencial' nunca entran a la lente (sea cual sea el backend).
graph_lens:
  enable: false                  # opcional; requiere graphify instalado fuera del repo
  backend:                       # VACÍO a propósito: el agente lo pregunta 1 vez y lo registra aquí.
                                 #   claude = conexión Claude Code (API) | local = Ollama | structural = sin LLM
  exclude_sensibilidad: [confidencial]
  out_dir: graphify-out          # derivado, gitignored
