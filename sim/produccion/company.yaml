# =====================================================================
# sim/produccion/company.yaml — MANIFIESTO DE ONBOARD (sandbox manufactura)
# Empresa ficticia. Mismo manifiesto -> mismo genoma.
# =====================================================================

company:
  name: "Forjados del Valle S.A."
  sector: "manufactura — autopartes metálicas (estampado y mecanizado)"
  language: es
  domains: ["forjadosdelvalle.com"]

# Tipos de documento que maneja el negocio (guían la clasificación de INGEST)
document_types:
  - orden-de-produccion        # OP: qué producir, en qué línea, qué lote
  - ficha-tecnica-producto     # specs estables del producto/SKU
  - registro-calidad           # inspecciones, no-conformidades (NCR)
  - hoja-mantenimiento         # mantenimiento preventivo/correctivo de máquina
  - ficha-proveedor            # proveedor de insumo (acero, pintura, empaque)

# Entidades clave: cada clave es una categoría -> carpeta en wiki/semantic/
entities:
  lineas:    ["L1-estampado", "L2-mecanizado"]
  maquinas:  ["PR-200-prensa", "CNC-07-torno"]
  productos: ["soporte-motor-SM45", "buje-BJ12"]
  lotes:     []                # se crean al ingerir órdenes/registros
  proveedores: ["AceroNorte", "PinturasIRBE"]

# Glosario / siglas internas (el agente las respeta al ingerir y consultar)
glossary:
  OP:   "orden de producción"
  NCR:  "non-conformance report — reporte de no-conformidad"
  SKU:  "stock keeping unit — referencia única de producto"
  OEE:  "overall equipment effectiveness — eficiencia global del equipo"
  MP:   "mantenimiento preventivo"
  lote: "cantidad de producto fabricada bajo una misma OP, trazable de punta a punta"
  Cpk:  "índice de capacidad del proceso"

roles:
  contributors: ["produccion", "calidad", "mantenimiento", "compras"]
  mutation_approver: "gerente-de-planta"

# Genes específicos del sector que ONBOARD siembra (pasan por la compuerta)
seed_genes:
  - id: gen-trazabilidad-lote
    trigger: "la fuente menciona un lote, OP o número de serie de producción"
    rule: >
      Todo lote es una entidad propia en wiki/semantic/lotes/ y DEBE enlazar, con
      relaciones tipadas, su cadena de trazabilidad: producido_en (máquina),
      bajo_orden (OP), de_producto (SKU) y, si aplica, insumo_de (proveedor/material).
      Ninguna página de lote se acepta sin al menos producido_en + bajo_orden.
    target_tier: semantic

  - id: gen-no-conformidad
    trigger: "la fuente es un registro de calidad con un defecto, rechazo o desviación (NCR)"
    rule: >
      Toda NCR va a wiki/semantic/calidad/ con severidad (menor|mayor|critica), lote
      afectado y disposición (reproceso|rechazo|concesion). DEBE enlazar afecta_a (lote)
      y, si la causa es de proceso, mitiga_con o viola (el SOP de calidad aplicable).
      decay_rate: high — una NCR es un evento fechado, no conocimiento estable.
    target_tier: semantic

  - id: gen-estado-maquina
    trigger: "la fuente reporta estado, mantenimiento o avería de una máquina"
    rule: >
      Cada máquina es una entidad estable en wiki/semantic/maquinas/ con un campo
      `estado` (operativa|en-mantenimiento|fuera-de-servicio) y `ultimo_mantenimiento`.
      El estado se ACTUALIZA en la misma página (no se duplica); el historial de eventos
      fechados vive en hojas de mantenimiento que enlazan mantiene_a la máquina.
    target_tier: semantic

# Verbos de dominio permitidos fuera del núcleo {usa, depende_de, contradice, reemplaza}.
# Declarados según gen-frontmatter-obligatorio v3; LINT valida contra núcleo ∪ estos.
relation_types:
  producido_en:    "lote producido en máquina"
  bajo_orden:      "lote o NCR bajo orden de producción"
  de_producto:     "lote/OP de producto (SKU)"
  insumo_de:       "lote/OP usa insumo de proveedor"
  afectado_por:    "lote afectado por evento de calidad"
  afecta_a:        "NCR afecta a lote"
  viola:           "NCR viola SOP de calidad"
  causa_en:        "NCR tiene causa en máquina"
  mitiga_con:      "NCR mitigada con intervención de mantenimiento"
  ubicada_en:      "máquina ubicada en línea"
  produjo_lote:    "máquina produjo lote"
  intervenida_por: "máquina intervenida por evento de mantenimiento"
  mantiene_a:      "evento de mantenimiento mantiene a máquina"
  resuelve:        "evento de mantenimiento resuelve NCR"
  genero_lote:     "OP generó lote"
  aplica_a:        "SOP aplica a máquina o entidad"
  reforzado_por:   "SOP reforzado por evento que lo confirma o detecta brecha"

# Taxonomía inicial de carpetas a crear por tier
taxonomy:
  semantic:   [productos, lineas, maquinas, lotes, calidad, proveedores]
  procedural: [sops-calidad, sops-mantenimiento]
